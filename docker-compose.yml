version: '3.8'

services:
  # Infrastructure: Data Persistence (MongoDB)
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - healthcare-net

  # Infrastructure: Asynchronous Messaging (Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - healthcare-net

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - healthcare-net

  # 1. Orchestrator Agent (The Router / Master Agent) — port 8015
  orchestrator-agent:
    build: ./services/orchestrator-agent
    ports:
      - "8015:8015"
    environment:
      - CARDIOLOGY_SERVICE_URL=http://cardiology-agent:8001/cardiology-agent
      - NEUROLOGY_SERVICE_URL=http://neurology-agent:8002/neurology-agent
      - CANCER_SERVICE_URL=http://cancer-agent:8003/cancer-agent
      - PATHOLOGY_SERVICE_URL=http://pathology-agent:8011/pathology-agent
      - TREATMENT_SERVICE_URL=http://treatment-agent:8012
      - XAI_SERVICE_URL=http://xai-validation-service:8016/xai-validator
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=agentic_ai_healthcare_db
      - CHROMA_PERSIST_DIR=/app/chroma_store
      - CHROMA_SIMILARITY_THRESHOLD=0.90
      - MAX_RETRY_COUNT=3
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - chroma_data:/app/chroma_store
    depends_on:
      - kafka
      - mongodb
    networks:
      - healthcare-net

  # 2. Cardiology Specialist Agent — port 8001
  cardiology-agent:
    build: ./services/cardiology-agent
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - healthcare-net

  # 3. Neurology Specialist Agent — port 8002
  neurology-agent:
    build: ./services/neurology-agent
    ports:
      - "8002:8002"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - healthcare-net

  # 4. Cancer Oncology Specialist Agent — port 8003
  cancer-agent:
    build: ./services/cancer-agent
    ports:
      - "8003:8003"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - healthcare-net

  # 5. Pathology Specialist Agent — port 8011
  pathology-agent:
    build: ./services/pathology-agent
    ports:
      - "8011:8011"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - healthcare-net

  # 6. Treatment & Patient Care Agent — port 8012
  treatment-agent:
    build: ./services/treatment-agent
    ports:
      - "8012:8012"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - healthcare-net

  # 7. XAI & Ethical Validator Service — port 8016
  xai-validation-service:
    build: ./xai-validation-service
    ports:
      - "8016:8016"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - healthcare-net

  # 8. Evaluation Service — port 8017
  evaluation-service:
    build: ./services/evaluation-service
    ports:
      - "8017:8017"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - healthcare-net

networks:
  healthcare-net:
    driver: bridge

volumes:
  mongo_data:
  chroma_data:
