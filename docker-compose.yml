services:

  # -- Infrastructure --------------------------------------------------------

  # ChromaDB Vector Store - shared by cancer-agent and orchestrator for RAG
  # Data is persisted to the host path set by $CHROMA_DATA_PATH (required).
  chromadb:
    image: chromadb/chroma:1.5.5
    ports:
      - "8020:8000"
    volumes:
      - ${CHROMA_DATA_PATH}:/chroma/chroma
    networks:
      - healthcare-net

  # MongoDB - persistent storage for patient records and session data
  mongodb:
    image: mongo:latest
    command: ["mongod", "--quiet"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - healthcare-net


  # -- Specialist Agents -----------------------------------------------------

  # 1. Cardiology Specialist Agent - port 8001
  cardiology-agent:
    build: ./services/cardiology-agent
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_DEFAULT_MODEL=${OPENAI_DEFAULT_MODEL:-gpt-5.2}
    networks:
      - healthcare-net

  # 2. Neurology Specialist Agent - port 8002
  neurology-agent:
    build: ./services/neurology-agent
    ports:
      - "8002:8002"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_DEFAULT_MODEL=${OPENAI_DEFAULT_MODEL:-gpt-5.2}
    networks:
      - healthcare-net

  # 3. Cancer Oncology Specialist Agent - port 8003
  cancer-agent:
    build: ./services/cancer-agent
    ports:
      - "8003:8003"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_DEFAULT_MODEL=${OPENAI_DEFAULT_MODEL:-gpt-5.2}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      chromadb:
        condition: service_started
    networks:
      - healthcare-net

  # 4. Pathology Specialist Agent - port 8011
  pathology-agent:
    build: ./services/pathology-agent
    ports:
      - "8011:8011"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_DEFAULT_MODEL=${OPENAI_DEFAULT_MODEL:-gpt-5.2}
    networks:
      - healthcare-net

  # 5. Treatment & Patient Care Agent - port 8012
  treatment-agent:
    build: ./services/treatment-agent
    ports:
      - "8012:8012"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_DEFAULT_MODEL=${OPENAI_DEFAULT_MODEL:-gpt-5.2}
    networks:
      - healthcare-net

  # -- Platform Services -----------------------------------------------------

  # 6. Orchestrator Agent (Router / Master Agent) - port 8015
  orchestrator-agent:
    build: ./services/orchestrator-agent
    ports:
      - "8015:8015"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_DEFAULT_MODEL=${OPENAI_DEFAULT_MODEL:-gpt-5.2}
      - CARDIOLOGY_SERVICE_URL=http://cardiology-agent:8001/cardiology-agent
      - NEUROLOGY_SERVICE_URL=http://neurology-agent:8002/neurology-agent
      - CANCER_SERVICE_URL=http://cancer-agent:8003/cancer-agent
      - PATHOLOGY_SERVICE_URL=http://pathology-agent:8011/pathology-agent
      - TREATMENT_SERVICE_URL=http://treatment-agent:8012
      - XAI_SERVICE_URL=http://xai-validation-service:8016/xai-validator
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=agentic_ai_healthcare_db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - CHROMA_SIMILARITY_THRESHOLD=0.90
      - MAX_RETRY_COUNT=3
    depends_on:
      mongodb:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - healthcare-net

  # 7. XAI & Ethical Validator Service - port 8016
  xai-validation-service:
    build: ./xai-validation-service
    ports:
      - "8016:8016"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - healthcare-net

  # 8. Evaluation Service - port 8017
  evaluation-service:
    build: ./services/evaluation-service
    ports:
      - "8017:8017"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - healthcare-net

  # -- Frontend --------------------------------------------------------------

  # 9. Patient UI - Streamlit web app - port 8021
  patient-ui:
    build: ./patient-ui
    ports:
      - "8021:8021"
    environment:
      - ORCHESTRATOR_URL=http://orchestrator-agent:8015
    depends_on:
      - orchestrator-agent
    networks:
      - healthcare-net

# -- Networks & Volumes -------------------------------------------------------

networks:
  healthcare-net:
    driver: bridge

volumes:
  mongo_data:
